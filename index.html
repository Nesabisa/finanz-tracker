<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Mein Budget 🌸</title>
<style>
:root{
  --rose:#ffc2d1;   --rose-bg:#fff0f5;  --rose-dk:#d4557a;
  --lav:#dbbef8;    --lav-bg:#f8f0ff;   --lav-dk:#8040c8;
  --peach:#ffc89a;  --peach-bg:#fff6ec; --peach-dk:#c86020;
  --sun:#f8e090;    --sun-bg:#fefce8;   --sun-dk:#a87800;
  --coral:#f8a8b0;  --coral-bg:#fff0f2; --coral-dk:#c03050;
  --mint-dk:#2a9e70;--mint-bg:#f0fdf8;
  --bg:#fdf5f8; --white:#fff; --border:#f0dde8;
  --text:#3a1828; --sub:#8a5870; --muted:#c4a0b4;
  --shadow:0 2px 14px rgba(180,60,110,.1);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:linear-gradient(to bottom,#fff0f5 0%,#f8f0ff 50%,#fff6ec 100%) fixed;color:var(--text);min-height:100vh;padding-bottom:72px}

/* NAV */
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:1px solid var(--border);display:flex;z-index:50;box-shadow:0 -2px 10px rgba(180,60,110,.08)}
.bnav button{flex:1;padding:8px 4px 10px;border:none;background:none;font-size:10px;font-weight:700;color:var(--muted);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;letter-spacing:.3px;text-transform:uppercase;transition:color .2s}
.bnav button .ni{font-size:22px}
.bnav button.active{color:var(--rose-dk)}

/* PAGES */
.page{display:none}.page.active{display:block}

/* HEADER */
.hdr{
  background:
    radial-gradient(ellipse 75% 65% at 18% 38%, rgba(255,255,255,.42) 0%, transparent 62%),
    radial-gradient(ellipse 60% 52% at 80% 30%, rgba(255,255,255,.38) 0%, transparent 56%),
    radial-gradient(ellipse 45% 38% at 55% 82%, rgba(255,255,255,.22) 0%, transparent 50%),
    radial-gradient(ellipse 38% 32% at 68% 12%, rgba(255,255,255,.28) 0%, transparent 48%),
    radial-gradient(ellipse 30% 25% at 35% 60%, rgba(255,255,255,.18) 0%, transparent 45%),
    linear-gradient(to right,#ffc89a 0%,#ffc2d1 25%,#dbbef8 50%,#ffc2d1 75%,#ffc89a 100%);
  padding:18px 16px 24px;position:relative;overflow:hidden
}
.hrt{font-size:42px;line-height:1;flex-shrink:1;min-width:36px;text-align:center;opacity:.28;cursor:pointer;transition:opacity .2s}
.hrt:active{opacity:.5}
.mnav{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:16px}
.nbtn{background:rgba(255,255,255,.3);border:none;width:40px;height:40px;min-width:40px;flex-shrink:0;border-radius:50%;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s;-webkit-tap-highlight-color:transparent}
.nbtn:hover{background:rgba(255,255,255,.5)}
.nbtn:active{background:rgba(255,255,255,.6);transform:scale(.95)}
.mlabel{font-size:20px;font-weight:800;min-width:130px;text-align:center;color:var(--text)}
.sumgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.scard{background:rgba(255,255,255,.32);border-radius:14px;padding:11px 8px;text-align:center;backdrop-filter:blur(4px)}
.slbl{font-size:10px;text-transform:uppercase;letter-spacing:.8px;margin-bottom:3px;opacity:.75}
.sval{font-size:17px;font-weight:800;color:var(--text)}
.sval.pos{color:#1a6040}.sval.neg{color:var(--coral-dk)}

/* PAGE HEADERS */
.page-hdr{padding:20px 16px 16px;background:linear-gradient(135deg,var(--lav) 0%,var(--rose) 100%)}
.page-hdr.sav-hdr{background:linear-gradient(135deg,var(--sun) 0%,var(--peach) 100%)}
.page-hdr h2{font-size:22px;font-weight:800;color:var(--text);margin-bottom:2px}
.page-hdr p{font-size:13px;color:var(--sub)}

/* CONTENT */
.content{padding:12px;max-width:640px;margin:0 auto}

/* CARDS */
.card{background:var(--white);border-radius:20px;margin-bottom:12px;overflow:hidden;box-shadow:var(--shadow)}
.card-hd{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:1px solid var(--border)}
.card-hd.inc {border-left:4px solid var(--rose-dk)}
.card-hd.fix {border-left:4px solid var(--lav-dk)}
.card-hd.var {border-left:4px solid var(--peach-dk)}
.card-hd.sav {border-left:4px solid var(--sun-dk)}
.card-hd.sond{border-left:4px solid var(--coral-dk)}
.ctitle{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--sub)}
.ctotal{font-size:16px;font-weight:800;color:var(--text)}

/* ROWS */
.row{display:flex;align-items:center;padding:11px 16px;border-bottom:1px solid var(--border);gap:10px}
.row:last-child{border-bottom:none}
.ico{font-size:19px;width:26px;text-align:center;flex-shrink:0}
.rname{flex:1;font-size:15px;color:var(--text)}
.ramt{font-size:14px;font-weight:700;flex-shrink:0}

/* EDITABLE NAME */
.name-wrap{flex:1;display:flex;align-items:center;gap:6px}
.edit-name{font-size:15px;color:var(--text);flex:1;border:none;background:transparent;padding:0;font-family:inherit}
.edit-name:focus{outline:none;border-bottom:1.5px solid var(--lav-dk)}
.edit-ico{font-size:12px;color:var(--muted);cursor:pointer;opacity:0;transition:opacity .2s;flex-shrink:0}
.row:hover .edit-ico,.sub-row:hover .edit-ico{opacity:1}

/* INPUTS */
.sal-in{width:120px;text-align:right;border:1.5px solid var(--border);border-radius:10px;padding:6px 10px;font-size:14px;font-weight:700;color:var(--mint-dk);background:#f9f6f8}
.sal-in:focus{outline:none;border-color:var(--rose-dk);background:var(--white)}
.amt-in{width:88px;text-align:right;border:1.5px solid transparent;border-radius:8px;padding:5px 8px;font-size:14px;font-weight:700;background:transparent;color:var(--text)}
.amt-in:focus{outline:none;border-color:var(--lav-dk);background:var(--white)}

/* DRAG SORT */
.drag-handle{display:flex;align-items:center;justify-content:center;padding:0 7px;cursor:grab;flex-shrink:0;touch-action:none;color:var(--muted);opacity:.35;-webkit-user-select:none;user-select:none;transition:opacity .15s}
.drag-handle:active{cursor:grabbing;opacity:.9}
.drag-active{opacity:.4!important;background:rgba(219,190,248,.18)!important;transform:scale(1.01);box-shadow:0 4px 16px rgba(139,60,200,.15)!important}
.drop-above{box-shadow:inset 0 3px 0 var(--lav-dk)!important}
.drop-below{box-shadow:inset 0 -3px 0 var(--lav-dk)!important}

/* FIXED ROWS */
.fx-row{background:var(--lav-bg);transition:background .25s}
.fx-row.done{background:var(--mint-bg)}
.fx-row.partial{background:var(--sun-bg)}
.fx-row.clickable{cursor:pointer}
.fx-row.clickable:hover{filter:brightness(.97)}
.sdot{width:24px;height:24px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .25s}
.sdot.empty{background:var(--white);border:2px solid var(--lav-dk);color:transparent;cursor:pointer}
.sdot.partial{background:var(--sun);border:2px solid var(--sun-dk);color:var(--sun-dk)}
.sdot.done{background:var(--mint-dk);border:2px solid var(--mint-dk);color:var(--white)}
.prog{font-size:11px;color:var(--muted);background:rgba(255,255,255,.7);border-radius:10px;padding:2px 7px;flex-shrink:0}
.arr{font-size:15px;color:var(--muted);flex-shrink:0}

/* VAR ROWS */
.var-row{cursor:pointer;transition:background .15s}
.var-row:hover{background:var(--peach-bg)}

/* INCOME */
.inc-amt{color:var(--mint-dk);font-weight:700}

/* BADGES */
.bdg{font-size:11px;border-radius:8px;padding:2px 7px;flex-shrink:0}
.bdg-fix{background:var(--lav-bg);color:var(--lav-dk)}
.bdg-ein{background:var(--peach-bg);color:var(--peach-dk)}

/* BUTTONS */
.delbtn{background:none;border:none;color:#e0c8d4;cursor:pointer;font-size:13px;padding:4px 6px;border-radius:6px;flex-shrink:0}
.delbtn:hover{color:#e53935}
.addbtn{display:flex;align-items:center;gap:6px;width:100%;padding:10px 16px;background:none;border:none;font-size:14px;font-weight:600;cursor:pointer;text-align:left;color:var(--sub);transition:background .15s}
.addbtn:hover{background:#fdf0f4}
.addbtn.rose{color:var(--rose-dk)}.addbtn.lav{color:var(--lav-dk)}.addbtn.peach{color:var(--peach-dk)}.addbtn.sun{color:var(--sun-dk)}.addbtn.coral{color:var(--coral-dk)}

/* FORMS */
.fwrap{display:none;padding:12px 16px;border-top:1px solid var(--border)}
.frose{background:var(--rose-bg)}.flav{background:var(--lav-bg)}.fpeach{background:var(--peach-bg)}.fsun{background:var(--sun-bg)}.fcoral{background:var(--coral-bg)}
.frow{display:flex;gap:8px;margin-bottom:8px}
.fi{border:1.5px solid var(--border);border-radius:10px;padding:9px 12px;font-size:14px;background:var(--white);color:var(--text);width:100%}
.fi:focus{outline:none;border-color:var(--lav-dk)}
.fi-h{flex:1}
.bsave{background:linear-gradient(135deg,var(--rose-dk),var(--lav-dk));color:#fff;border:none;border-radius:10px;padding:9px 20px;font-size:14px;font-weight:700;cursor:pointer}
.bsave:hover{opacity:.9}
.bsave.sun{background:linear-gradient(135deg,var(--sun-dk),var(--peach-dk))}
.bcanc{background:var(--bg);color:var(--sub);border:1.5px solid var(--border);border-radius:10px;padding:9px 14px;font-size:14px;cursor:pointer}

/* CHIPS */
.chips{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.chip{padding:7px 14px;border-radius:20px;border:1.5px solid var(--border);background:var(--white);font-size:13px;font-weight:600;cursor:pointer;color:var(--sub);user-select:none}
.chip.on-fix{background:var(--lav-bg);border-color:var(--lav-dk);color:var(--lav-dk)}
.chip.on-ein{background:var(--peach-bg);border-color:var(--peach-dk);color:var(--peach-dk)}

/* SHEET */
.overlay{display:none;position:fixed;inset:0;background:rgba(50,10,30,.45);z-index:100;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.sheet{background:var(--white);border-radius:24px 24px 0 0;width:100%;max-width:640px;max-height:88vh;display:flex;flex-direction:column}
.shandle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 4px;flex-shrink:0}
.shd{display:flex;align-items:center;justify-content:space-between;padding:12px 20px 12px;border-bottom:1px solid var(--border);flex-shrink:0;gap:10px}
.stitle{font-size:18px;font-weight:800;flex:1}
.stotal{font-size:17px;font-weight:800;color:var(--sub);flex-shrink:0}
.xbtn{background:var(--border);border:none;width:28px;height:28px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--sub);font-size:12px;flex-shrink:0}
.sbody{overflow-y:auto;max-height:calc(88vh - 145px)}
.sfoot{border-top:1px solid var(--border);flex-shrink:0}
.sform{display:none;padding:14px 20px}
.empty-hint{text-align:center;color:var(--muted);padding:28px;font-size:14px}

/* SUB-ITEM ROWS (in fixed sheet) */
.sub-row{display:flex;align-items:center;padding:11px 20px;border-bottom:1px solid var(--border);gap:8px}
.sub-row:last-child{border-bottom:none}
.schk{width:24px;height:24px;border:2px solid var(--lav-dk);border-radius:7px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px;color:transparent;background:var(--white);transition:all .2s}
.schk.done{background:var(--mint-dk);border-color:var(--mint-dk);color:var(--white)}
.sname-in{flex:1;border:1.5px solid var(--border);border-radius:8px;padding:4px 8px;font-size:14px;color:var(--text);background:var(--lav-bg);font-family:inherit}
.sname-in:focus{outline:none;border-color:var(--lav-dk);background:var(--white)}
.samt-in{width:80px;text-align:right;border:1.5px solid transparent;border-radius:8px;padding:4px 8px;font-size:14px;font-weight:600;background:transparent;color:var(--text);font-family:inherit}
.samt-in:focus{outline:none;border-color:var(--lav-dk);background:var(--white)}
.sacc-sel{border:1.5px solid transparent;border-radius:8px;padding:3px 6px;font-size:11px;background:transparent;color:var(--muted);max-width:90px;flex-shrink:0}
.sacc-sel:focus{outline:none;border-color:var(--sun-dk);background:var(--white)}

/* ENTRY ROWS */
.erow{display:flex;align-items:center;padding:11px 20px;border-bottom:1px solid var(--border);gap:8px}
.edate{font-size:12px;color:var(--muted);width:46px;flex-shrink:0}
.edesc{flex:1;font-size:14px}
.eamt{font-size:14px;font-weight:700;flex-shrink:0}
.eamt.ein{color:var(--peach-dk)}

/* STATS */
.expand-block{background:var(--white);border-radius:16px;margin-bottom:10px;overflow:hidden;box-shadow:var(--shadow)}
.exp-hd{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer}
.exp-hd:hover{background:#fdf5f8}
.exp-title{font-size:15px;font-weight:700}
.exp-ico{font-size:14px;color:var(--muted);transition:transform .2s}
.exp-ico.open{transform:rotate(90deg)}
.exp-body{display:none;border-top:1px solid var(--border)}
.exp-body.open{display:block}
.bar-row{display:flex;align-items:center;gap:10px;padding:7px 16px}
.bar-lbl{font-size:13px;width:130px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-bg{flex:1;height:10px;background:var(--border);border-radius:5px;overflow:hidden}
.bar-fill{height:100%;border-radius:5px}
.bar-fill.rose{background:linear-gradient(90deg,var(--rose),var(--rose-dk))}
.bar-fill.lav{background:linear-gradient(90deg,var(--lav),var(--lav-dk))}
.bar-fill.peach{background:linear-gradient(90deg,var(--peach),var(--peach-dk))}
.bar-val{font-size:13px;font-weight:700;width:72px;text-align:right;flex-shrink:0}

/* SAVINGS */
.acc-card{background:var(--white);border-radius:16px;padding:16px;box-shadow:var(--shadow);margin-bottom:10px;border-left:4px solid var(--sun-dk)}
.acc-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:4px}
.acc-name{font-size:14px;font-weight:700;color:var(--sub)}
.acc-bal{font-size:26px;font-weight:800;color:var(--text)}
.acc-meta{font-size:12px;color:var(--muted);margin-top:2px}
.acc-start-row{display:flex;align-items:center;gap:8px;margin-top:8px}
.acc-start-lbl{font-size:12px;color:var(--sub)}
.acc-start-in{width:110px;text-align:right;border:1.5px solid var(--border);border-radius:8px;padding:5px 8px;font-size:13px;font-weight:600;background:#f9f6f8;color:var(--text)}
.acc-start-in:focus{outline:none;border-color:var(--sun-dk);background:var(--white)}

.chart-wrap{background:var(--white);border-radius:16px;padding:14px 14px 8px;box-shadow:var(--shadow);margin-bottom:10px}
.chart-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--sub);margin-bottom:10px}
.chart-legend{display:flex;flex-wrap:wrap;gap:10px;padding:8px 0 4px;font-size:12px}
.leg-item{display:flex;align-items:center;gap:5px}
.leg-dot{width:10px;height:10px;border-radius:50%}

.sond-row{display:flex;align-items:center;padding:10px 16px;border-bottom:1px solid var(--border);gap:8px}
.sond-date{font-size:12px;color:var(--muted);width:48px;flex-shrink:0}
.sond-acc{font-size:11px;background:var(--sun-bg);color:var(--sun-dk);border-radius:8px;padding:2px 7px;flex-shrink:0}
.sond-desc{flex:1;font-size:14px}
.sond-amt{font-size:14px;font-weight:700;color:var(--coral-dk);flex-shrink:0}

/* DEL CONFIRM */
.del-conf{padding:22px 24px}
.del-conf p{font-size:15px;margin-bottom:18px;padding-top:8px}
.del-btns{display:flex;gap:8px;margin-bottom:8px}

.loading{text-align:center;padding:48px;color:var(--muted);font-size:15px}
.snack{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:10px 20px;border-radius:10px;font-size:14px;opacity:0;pointer-events:none;transition:opacity .3s;z-index:300;white-space:nowrap}
.snack.show{opacity:1}

/* ICON EDITABLE */
.ico-btn{cursor:pointer;transition:transform .15s}
.ico-btn:hover{transform:scale(1.25)}
</style>
</head>
<body>

<!-- PAGE: HAUSHALT -->
<div class="page active" id="page-budget">
  <div class="hdr">
    <div class="mnav">
      <span class="hrt" id="hrt1">💜</span>
      <button class="nbtn" id="prevBtn">&#8249;</button>
      <span class="mlabel" id="mlabel"></span>
      <button class="nbtn" id="nextBtn">&#8250;</button>
      <span class="hrt" id="hrt2">💜</span>
    </div>
    <div class="sumgrid">
      <div class="scard"><div class="slbl">Einnahmen</div><div class="sval" id="sInc">€0</div></div>
      <div class="scard"><div class="slbl">Ausgaben</div><div class="sval" id="sExp">€0</div></div>
      <div class="scard"><div class="slbl">Übrig</div><div class="sval" id="sBal">€0</div></div>
    </div>
  </div>
  <div class="content" id="content"><div class="loading">Lade... 🌸</div></div>
</div>

<!-- PAGE: STATISTIK -->
<div class="page" id="page-stats">
  <div class="page-hdr"><h2>📊 Statistik</h2><p>Ausgaben über die Monate</p></div>
  <div class="content" id="statsContent"><div class="loading">Lade...</div></div>
</div>

<!-- PAGE: SPAREN -->
<div class="page" id="page-savings">
  <div class="page-hdr sav-hdr"><h2>🌱 Sparen</h2><p>Kontenübersicht & Entwicklung</p></div>
  <div class="content" id="savContent"><div class="loading">Lade...</div></div>
</div>

<!-- BOTTOM NAV -->
<nav class="bnav">
  <button class="active" data-page="budget"><span class="ni">🏠</span>Haushalt</button>
  <button data-page="stats"><span class="ni">📊</span>Statistik</button>
  <button data-page="savings"><span class="ni">🌱</span>Sparen</button>
</nav>

<!-- FIXED COST SHEET -->
<div class="overlay" id="fxOvl">
  <div class="sheet">
    <div class="shandle"></div>
    <div class="shd">
      <input class="stitle" id="fxTitle" style="border:none;background:transparent;font-size:18px;font-weight:800;color:var(--text);font-family:inherit">
      <span class="stotal" id="fxTotal"></span>
      <button class="xbtn" id="closeFx">&#x2715;</button>
    </div>
    <div class="sbody" id="fxBody"></div>
    <div class="sfoot">
      <button class="addbtn lav" id="fxAddSubTrig">&#43; Unterposten hinzufügen</button>
      <div class="sform flav" id="fxAddForm">
        <div class="frow">
          <input class="fi fi-h" id="subName" list="sugg" placeholder="Name (z.B. Katzenkrankenversicherung)">
          <input class="fi" type="number" id="subAmt" placeholder="€" step="0.01" style="width:80px">
        </div>
        <div class="frow" style="margin:0">
          <button class="bsave" id="subSave">Hinzufügen</button>
          <button class="bcanc" id="subCanc">Abbrechen</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- VARIABLE SHEET -->
<div class="overlay" id="varOvl">
  <div class="sheet">
    <div class="shandle"></div>
    <div class="shd">
      <input class="stitle" id="varTitle" style="border:none;background:transparent;font-size:18px;font-weight:800;color:var(--text);font-family:inherit">
      <span class="stotal" id="varTotal"></span>
      <button class="xbtn" id="closeVar">&#x2715;</button>
    </div>
    <div class="sbody" id="varBody"></div>
    <div class="sfoot">
      <button class="addbtn peach" id="varAddTrig">&#43; Eintrag hinzufügen</button>
      <div class="sform fpeach" id="varForm">
        <div class="frow">
          <input class="fi fi-h" type="number" id="eAmt" placeholder="Betrag (€)" step="0.01" min="0">
          <input class="fi fi-h" type="date" id="eDate">
        </div>
        <input class="fi" id="eDesc" list="sugg" placeholder="Beschreibung (optional)" style="margin-bottom:8px">
        <div class="chips">
          <div class="chip" id="chipFix">🔄 Wiederholt sich</div>
          <div class="chip" id="chipEin">💫 Einmalausgabe</div>
        </div>
        <div class="frow" style="margin:0">
          <button class="bsave" id="saveEntry">Speichern</button>
          <button class="bcanc" id="cancEntry">Abbrechen</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- MANUAL SAVINGS ADDITION SHEET -->
<div class="overlay" id="manOvl">
  <div class="sheet" style="max-height:45vh">
    <div class="shandle"></div>
    <div class="shd"><span class="stitle" id="manTitle">Betrag hinzufügen</span><button class="xbtn" id="closeMan">&#x2715;</button></div>
    <div class="sform fsun" style="display:block;padding:20px">
      <div class="frow">

// ── STATE

async function loadSettings(){
  const s=await getDoc(settRef());
  if(s.exists()){
    S=s.data();
    S.fixedCosts=S.fixedCosts||clone(DEF_FX);
    S.categories=S.categories||clone(DEF_CATS);
    S.recurring=S.recurring||[];
    S.savingsAccounts=S.savingsAccounts||clone(DEF_ACCS);
    S.suggestions=S.suggestions||[];
    // Migration: split combined "Sparkasse / Sparen"
    const combined=S.fixedCosts.find(f=>f.name==='Sparkasse / Sparen'||f.id==='sparkasse_sparen');
    if(combined){
      S.fixedCosts=S.fixedCosts.filter(f=>f!==combined);
      if(!S.fixedCosts.find(f=>f.id==='sparkasse'))S.fixedCosts.splice(2,0,clone(DEF_FX[2]));
      if(!S.fixedCosts.find(f=>f.id==='sparen'))S.fixedCosts.splice(3,0,clone(DEF_FX[3]));
    }
    // Migration: update icons to latest version
    const catIcons={'essen':'🛒','ausgehen':'🍷','gesund':'🏥','tiere':'🐾','klamotten':'👠','drogerie':'🧴','bildung':'📚','geschenke':'🎀','auto':'🚗','urlaub':'✈️','pers':'🪞','sonst':'🌟'};
    let iconChanged=false;
    (S.categories||[]).forEach(c=>{if(catIcons[c.id]&&c.icon!==catIcons[c.id]){c.icon=catIcons[c.id];iconChanged=true;}});
    (S.fixedCosts||[]).forEach(f=>{if(f.id==='sparen'&&(f.icon==='🐷'||f.icon==='💰')){f.icon='🌱';iconChanged=true;}});
    if(iconChanged||combined)await setDoc(settRef(),S);
  } else {
    S={fixedCosts:clone(DEF_FX),categories:clone(DEF_CATS),recurring:[],savingsAccounts:clone(DEF_ACCS),suggestions:[]};
    await setDoc(settRef(),S);
  }
}

async function loadOrInitMonth(){
  let snap;
  try{snap=await getDoc(monRef());}catch(e){
    // Firebase read failed → leerer Monat (kein Crash)
    snap=null;
  }
  // Wenn der Monat in der Zukunft liegt UND kein Gehalt eingetragen wurde
  // → frischen Start erzwingen (verhindert korrupte Daten vom Navigation-Race)
  const nowYr=new Date().getFullYear(),nowMo=new Date().getMonth();
  const isFuture=(yr>nowYr)||(yr===nowYr&&mo>nowMo);
  const hasRealData=snap?.exists()&&!!(snap.data().salary||snap.data().variableEntries?.length||snap.data().extraIncome?.length);
  if(snap?.exists()&&(!isFuture||hasRealData)){
    M=snap.data();
    M.extraIncome=M.extraIncome||[];
    M.fixedCosts=(M.fixedCosts||[]).map(fc=>{
      // Deduplizierung: entfernt versehentlich mehrfach hinzugefügte Unterposten
      const seen=new Set();
      return{...fc,subs:(fc.subs||[]).filter(s=>{
        const k=(s.name||'')+'|'+(s.amount||0);
        if(seen.has(k))return false;seen.add(k);return true;
      })};
    });
    M.variableEntries=M.variableEntries||[];
    // Ensure Sparkasse and Sparen exist as separate items
    for(const def of[DEF_FX[2],DEF_FX[3]]){
      if(!M.fixedCosts.find(f=>f.id===def.id)){
        M.fixedCosts.splice(2,0,makeMoFx(def));
      }
    }
  } else {
    let prevSal=0;
    try{const py=mo===0?yr-1:yr,pm=mo===0?12:mo,ps=await getDoc(doc(db,'personal_months',`${py}-${pad(pm)}`));if(ps.exists())prevSal=ps.data().salary||0;}catch(e){}
    M={salary:prevSal,extraIncome:[],
      fixedCosts:(S.fixedCosts||[]).map(makeMoFx),
      variableEntries:clone(S.recurring||[]).map(r=>({...r,id:uid(),date:today()}))
    };
    // Nicht sofort speichern — erst wenn Sabine wirklich etwas einträgt
  }
}

function makeMoFx(fc){
  return{id:fc.id,name:fc.name,icon:fc.icon,amount:fc.def||0,checked:false,paidDate:null,
    subs:(fc.subs||[]).map(si=>({id:si.id,name:si.name,amount:si.def||0,checked:false,paidDate:null,accId:si.accId||''}))};
}

// ── HELPERS
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const today=()=>new Date().toISOString().split('T')[0];
const clone=x=>JSON.parse(JSON.stringify(x));
const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const fmt=n=>new Intl.NumberFormat('de-DE',{style:'currency',currency:'EUR'}).format(n||0);
const fmtD=iso=>{if(!iso)return'—';const[,m,d]=iso.split('-');return`${d}.${m}.`;};
const mk=(t,c)=>{const e=document.createElement(t);if(c)e.className=c;return e;};
function snack(msg){const e=document.getElementById('snack');e.textContent=msg;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),2500);}
function showF(id,show){const f=document.getElementById(id);if(f)f.style.display=show?'block':'none';}

function refreshSugg(){
  const set=new Set([...(S.suggestions||[]),...(S.categories||[]).map(c=>c.name),...(S.fixedCosts||[]).map(f=>f.name),...(S.fixedCosts||[]).flatMap(f=>(f.subs||[]).map(s=>s.name)),...(S.recurring||[]).map(r=>r.description).filter(Boolean),...(M.variableEntries||[]).map(e=>e.description).filter(Boolean)]);
  document.getElementById('sugg').innerHTML=[...set].filter(Boolean).map(v=>`<option value="${esc(v)}">`).join('');
}
function addSugg(v){if(v&&!(S.suggestions||[]).includes(v)){S.suggestions=S.suggestions||[];S.suggestions.push(v);}}

// ── CALCS
function effAmt(fc){return fc.subs&&fc.subs.length?fc.subs.reduce((s,si)=>s+(si.amount||0),0):(fc.amount||0);}
function checkedSt(fc){
  if(!fc.subs||!fc.subs.length)return fc.checked?'done':'empty';
  const n=fc.subs.filter(s=>s.checked).length;
  return n===0?'empty':n===fc.subs.length?'done':'partial';
}
function catTotal(id){return(M.variableEntries||[]).filter(e=>e.categoryId===id).reduce((s,e)=>s+(e.amount||0),0);}
function totalInc(){return(M.salary||0)+(M.extraIncome||[]).reduce((s,e)=>s+(e.amount||0),0);}
function totalExp(){
  const f=(M.fixedCosts||[]).reduce((s,fc)=>fc.subs&&fc.subs.length?s+fc.subs.filter(si=>si.checked).reduce((a,si)=>a+(si.amount||0),0):s+(fc.checked?fc.amount||0:0),0);
  return f+(M.variableEntries||[]).reduce((s,e)=>s+(e.amount||0),0);
}
function updateSum(){
  const i=totalInc(),e=totalExp(),b=i-e;
  document.getElementById('sInc').textContent=fmt(i);
  document.getElementById('sExp').textContent=fmt(e);
  const el=document.getElementById('sBal');el.textContent=fmt(b);el.className='sval '+(b>=0?'pos':'neg');
}

// ── DRAG SORT
const DRAG_ICO=`<svg width="11" height="17" viewBox="0 0 11 17" fill="currentColor" style="display:block"><circle cx="3" cy="3" r="2"/><circle cx="8" cy="3" r="2"/><circle cx="3" cy="8.5" r="2"/><circle cx="8" cy="8.5" r="2"/><circle cx="3" cy="14" r="2"/><circle cx="8" cy="14" r="2"/></svg>`;

function enableDragSort(sec,rowSel,onDrop){
  let src=null,srcIdx=-1;
  sec.addEventListener('pointerdown',e=>{
    const h=e.target.closest('.drag-handle');
    if(!h||!sec.contains(h))return;
    const row=h.closest(rowSel);if(!row)return;
    e.preventDefault();
    src=row;srcIdx=[...sec.querySelectorAll(rowSel)].indexOf(row);
    src.classList.add('drag-active');h.setPointerCapture(e.pointerId);
  },{passive:false});
  sec.addEventListener('pointermove',e=>{
    if(!src)return;
    const rows=[...sec.querySelectorAll(rowSel)];
    rows.forEach(r=>r.classList.remove('drop-above','drop-below'));
    for(const r of rows){
      if(r===src)continue;
      const rect=r.getBoundingClientRect();
      if(e.clientY>=rect.top&&e.clientY<rect.bottom){
        r.classList.add(e.clientY<rect.top+rect.height/2?'drop-above':'drop-below');
        break;
      }
    }
  });
  const done=()=>{
    if(!src)return;
    const rows=[...sec.querySelectorAll(rowSel)];
    let dst=-1;
    rows.forEach((r,i)=>{
      if(r.classList.contains('drop-above'))dst=i;
      if(r.classList.contains('drop-below'))dst=i+1;
      r.classList.remove('drop-above','drop-below','drag-active');
    });
    if(dst>srcIdx)dst--;
    if(dst>=0&&dst!==srcIdx)onDrop(srcIdx,dst);
    src=null;srcIdx=-1;
  };
  sec.addEventListener('pointerup',done);
  sec.addEventListener('pointercancel',()=>{
    if(src){[...sec.querySelectorAll(rowSel)].forEach(r=>r.classList.remove('drop-above','drop-below','drag-active'));src=null;srcIdx=-1;}
  });
}

// ── RENDER BUDGET
function render(){

// Income section
function buildIncome(){

    const r=mk('div','row');
    r.innerHTML=`<span class="ico">💸</span><span class="rname">${esc(x.description)||'—'}</span><span class="inc-amt">+${fmt(x.amount)}</span><button class="delbtn">✕</button>`;

    <div class="frow" style="margin:0"><button class="bsave" id="xs">Hinzufügen</button><button class="bcanc" id="xc">Abbrechen</button></div>`;
  sec.appendChild(af);
  const salIn=sec.querySelector('#salIn');
  salIn.addEventListener('change',async e=>{if(!M)return;M.salary=parseFloat(e.target.value)||0;await save();});

}
async function addExtra(){
  const d=document.getElementById('xd').value.trim(),a=parseFloat(document.getElementById('xa').value);

// Fixed section
function buildFixed(){
  const sec=mk('div','card');

  sec.appendChild(hd);
  for(const fc of(M.fixedCosts||[])){
    const st=checkedSt(fc);
    const n=fc.subs?fc.subs.length:0;
    const displayIcon='🏷️';
    const row=mk('div',`fx-row row ${st}`);
    let dotHtml=`<div class="sdot ${st}">${st==='done'?'✓':st==='partial'?'~':''}</div>`;
    let progHtml=n>1?`<span class="prog">${fc.subs.filter(s=>s.checked).length}/${n}</span>`:'';
    let amtHtml=n===0?`<input class="amt-in" type="number" value="${fc.amount||''}" placeholder="0,00" step="0.01">`:
                `<span class="ramt">${fmt(effAmt(fc))}</span>`;
    let arrHtml=`<span class="arr">›</span>`;
    row.innerHTML=`<span class="drag-handle" title="Verschieben">${DRAG_ICO}</span>${dotHtml}<span class="ico">${displayIcon}</span>
      <div class="name-wrap"><span class="edit-name">${esc(fc.name)}</span><span class="edit-ico" title="Umbenennen">✏️</span></div>
      ${progHtml}${amtHtml}${arrHtml}<button class="delbtn">✕</button>`;

    const dot=row.querySelector('.sdot');
    const editIco=row.querySelector('.edit-ico');

    // Edit name inline
    editIco.onclick=e=>{e.stopPropagation();const v=prompt('Name ändern:',fc.name);if(v&&v.trim())renameFx(fc.id,v.trim());};

    // Dot click: toggle checked state
    if(n===0){
      dot.onclick=e=>{e.stopPropagation();toggleFxDirect(fc.id);};
      row.querySelector('.amt-in')?.addEventListener('change',e=>{e.stopPropagation();updFxAmt(fc.id,parseFloat(e.target.value)||0);});
    } else if(n===1){
      dot.onclick=e=>{e.stopPropagation();toggleSub(fc.id,fc.subs[0].id);};
    } else {
      dot.onclick=e=>{e.stopPropagation();toggleAllSubs(fc.id);};
    }
    // All rows open sheet on click (except dot, delbtn, amt-in, edit-ico)
    row.classList.add('clickable');
    row.onclick=e=>{if(['sdot','delbtn','amt-in','edit-ico','drag-handle'].some(c=>e.target.classList.contains(c))||e.target.closest('.drag-handle'))return;openFxSheet(fc.id);};
    row.querySelector('.delbtn').onclick=e=>{e.stopPropagation();delFx(fc.id);};
    sec.appendChild(row);
  }
  enableDragSort(sec,'.fx-row',(from,to)=>{
    const[mx]=M.fixedCosts.splice(from,1);M.fixedCosts.splice(to,0,mx);
    const[sx]=S.fixedCosts.splice(from,1);S.fixedCosts.splice(to,0,sx);
    render();Promise.all([save(),saveSett()]);
  });

function renderFxBody(){
  const fc=M.fixedCosts.find(f=>f.id===activeFxId);if(!fc)return;
  document.getElementById('fxTotal').textContent=fmt(effAmt(fc));
  const body=document.getElementById('fxBody');body.innerHTML='';
  if(!fc.subs||!fc.subs.length){
    // No subs: show single checkable row with editable name
    const r=mk('div','sub-row');
    r.innerHTML=`<div class="schk${fc.checked?' done':''}">✓</div>
      <input class="sname-in" type="text" value="${esc(fc.name)}" placeholder="Name">
      <input class="samt-in" type="number" value="${fc.amount||''}" placeholder="0,00" step="0.01">`;
    r.querySelector('.schk').onclick=()=>toggleFxDirect(fc.id);
    const ni=r.querySelector('.sname-in');
    ni.addEventListener('change',e=>{if(e.target.value.trim())renameFx(fc.id,e.target.value.trim());});
    ni.addEventListener('blur',e=>{if(e.target.value.trim())renameFx(fc.id,e.target.value.trim());});
    r.querySelector('.samt-in').addEventListener('change',e=>updFxAmt(fc.id,parseFloat(e.target.value)||0));
    body.appendChild(r);
  } else {

      const r=mk('div','sub-row');
      const accOpts=(S.savingsAccounts||[]).map(a=>`<option value="${a.id}"${si.accId===a.id?' selected':''}>${esc(a.name)}</option>`).join('');
      const showAccSel=(fc.id==='sparen'||fc.id==='sparkasse'||si.accId);
      r.innerHTML=`<div class="schk${si.checked?' done':''}">✓</div>
        <input class="sname-in" type="text" value="${esc(si.name)}" placeholder="Name">
        <input class="samt-in" type="number" value="${si.amount||''}" placeholder="€" step="0.01">
        ${showAccSel?`<select class="sacc-sel"><option value="">— Konto —</option>${accOpts}</select>`:''}
        <button class="delbtn" style="font-size:12px">✕</button>`;
      r.querySelector('.schk').onclick=()=>toggleSub(fc.id,si.id);
      const nameIn=r.querySelector('.sname-in');
      nameIn.addEventListener('change',e=>updSubName(fc.id,si.id,e.target.value));
      nameIn.addEventListener('blur',e=>updSubName(fc.id,si.id,e.target.value));
      r.querySelector('.samt-in').addEventListener('change',e=>updSubAmt(fc.id,si.id,parseFloat(e.target.value)||0));
      r.querySelector('.delbtn').onclick=()=>delSub(fc.id,si.id);
      const sel=r.querySelector('.sacc-sel');
      if(sel)sel.addEventListener('change',e=>updSubAccId(fc.id,si.id,e.target.value));
      body.appendChild(r);
    }
  }
}

async function toggleFxDirect(id){
  const fc=M?.fixedCosts?.find(f=>f.id===id);if(!fc)return;
  fc.checked=!fc.checked;fc.paidDate=fc.checked?today():null;
  renderFxBody();render(); // sofort zeigen
  try{await save();}catch(e){console.error('toggleFxDirect:',e);snack('⚠️ Speichern fehlgeschlagen');}
}
async function toggleSub(fid,sid){
  const fc=M?.fixedCosts?.find(f=>f.id===fid),si=fc?.subs?.find(s=>s.id===sid);if(!si)return;
  si.checked=!si.checked;si.paidDate=si.checked?today():null;
  renderFxBody();render(); // sofort zeigen
  try{if(!SAV)await loadSavings();
  // Auto-detect account by name if no accId
  let accId=si.accId||'';
  if(!accId){
    const lower=si.name.toLowerCase();
    accId=(S.savingsAccounts||[]).find(a=>lower.includes(a.name.toLowerCase().split(' ')[0]))?.id||'';
  }
  if(accId){
    const key=`${fid}-${sid}-${yr}-${pad(mo+1)}`;
    SAV.deposits=(SAV.deposits||[]).filter(d=>d.key!==key);
    if(si.checked)SAV.deposits.push({id:uid(),key,accountId:accId,amount:si.amount||0,date:today(),month:`${yr}-${pad(mo+1)}`,desc:si.name,source:'auto'});
    await savSAV();savLoaded=false;
  }
  await save();
  }catch(e){console.error('toggleSub:',e);snack('⚠️ Speichern fehlgeschlagen');}
}
async function toggleAllSubs(fid){
  const fc=M?.fixedCosts?.find(f=>f.id===fid);if(!fc||!fc.subs?.length)return;
  // Sofort visuell updaten (optimistic UI)
  const newState=!fc.subs.every(s=>s.checked);
  fc.subs.forEach(si=>{si.checked=newState;si.paidDate=newState?today():null;});
  render(); // sofort zeigen
  try{
    if(!SAV)await loadSavings();
    let savChanged=false;
    for(const si of fc.subs){
      let accId=si.accId||'';
      if(!accId){const lower=si.name.toLowerCase();accId=(S.savingsAccounts||[]).find(a=>lower.includes(a.name.toLowerCase().split(' ')[0]))?.id||'';}
      if(accId){
        const key=`${fid}-${si.id}-${yr}-${pad(mo+1)}`;
        SAV.deposits=(SAV.deposits||[]).filter(d=>d.key!==key);
        if(newState)SAV.deposits.push({id:uid(),key,accountId:accId,amount:si.amount||0,date:today(),month:`${yr}-${pad(mo+1)}`,desc:si.name,source:'auto'});
        savChanged=true;
      }
    }
    if(savChanged){await savSAV();savLoaded=false;}
    await save();
  }catch(e){console.error('toggleAllSubs:',e);snack('⚠️ Speichern fehlgeschlagen');}
}
async function updFxAmt(id,a){
  const fc=M.fixedCosts.find(f=>f.id===id);if(fc)fc.amount=a;

  document.getElementById('fxTotal').textContent=fmt(effAmt(fc||{}));

}
async function updSubAmt(fid,sid,a){
  const fc=M.fixedCosts.find(f=>f.id===fid),si=fc?.subs?.find(s=>s.id===sid);if(si)si.amount=a;
  const sf=S.fixedCosts.find(f=>f.id===fid),ss=sf?.subs?.find(s=>s.id===sid);if(ss)ss.def=a;

  if(si?.checked&&si.accId){
    const key=`${fid}-${sid}-${yr}-${pad(mo+1)}`;

}

async function buildStats(){
  const c=document.getElementById('statsContent');c.innerHTML='<div class="loading">Lade...</div>';
  const months=[];
  for(let i=5;i>=0;i--){let my=yr,mm=mo-i;if(mm<0){mm+=12;my--;}
    try{const s=await getDoc(doc(db,'personal_months',`${my}-${pad(mm+1)}`));if(s.exists())months.push({key:`${my}-${pad(mm+1)}`,yr:my,mo:mm,data:s.data()});}catch(e){}}
  c.innerHTML='';
  // Month chart
  const cblock=mk('div','expand-block');
  const chd=mk('div','exp-hd');chd.innerHTML=`<span class="exp-title">📅 Übersicht (6 Monate)</span><span class="exp-ico open">›</span>`;
  const cbody=mk('div','exp-body open');
  const maxV=Math.max(...months.map(m=>(m.data.salary||0)+(m.data.extraIncome||[]).reduce((s,e)=>s+(e.amount||0),0)),1);
  months.forEach(m=>{
    const inc=(m.data.salary||0)+(m.data.extraIncome||[]).reduce((s,e)=>s+(e.amount||0),0);
    const exp=(m.data.fixedCosts||[]).reduce((s,fc)=>fc.subs&&fc.subs.length?s+fc.subs.filter(si=>si.checked).reduce((a,si)=>a+(si.amount||0),0):s+(fc.checked?fc.amount||0:0),0)+(m.data.variableEntries||[]).reduce((s,e)=>s+(e.amount||0),0);
    const r=mk('div','bar-row');
    r.innerHTML=`<span class="bar-lbl">${MN[m.mo].slice(0,3)} ${m.yr}</span>
      <div style="flex:1;display:flex;flex-direction:column;gap:3px">
        <div style="display:flex;align-items:center;gap:6px"><div class="bar-bg" style="height:8px"><div class="bar-fill rose" style="width:${Math.round(inc/maxV*100)}%"></div></div><span style="font-size:11px;color:var(--muted);width:60px;text-align:right">${fmt(inc)}</span></div>
        <div style="display:flex;align-items:center;gap:6px"><div class="bar-bg" style="height:8px"><div class="bar-fill lav" style="width:${Math.round(exp/maxV*100)}%"></div></div><span style="font-size:11px;color:var(--muted);width:60px;text-align:right">${fmt(exp)}</span></div>
      </div>`;
    cbody.appendChild(r);
  });
  cbody.innerHTML+=`<div style="display:flex;gap:16px;padding:8px 16px;font-size:12px;color:var(--sub)"><span>🟥 Einnahmen</span><span>🟪 Ausgaben</span></div>`;
  chd.onclick=()=>{cbody.classList.toggle('open');chd.querySelector('.exp-ico').classList.toggle('open');};
  cblock.appendChild(chd);cblock.appendChild(cbody);c.appendChild(cblock);
  // Fixed breakdown
  c.appendChild(buildStatsBlock('📌 Fixkosten (Gesamt)','lav',months,m=>{
    const items={};
    (m.data.fixedCosts||[]).forEach(fc=>{const a=effAmt(fc);if(a)items[`${fc.icon||''} ${fc.name}`]=(items[`${fc.icon||''} ${fc.name}`]||0)+a;});
    return items;
  }));
  // Variable breakdown
  c.appendChild(buildStatsBlock('💳 Variable Ausgaben (Gesamt)','peach',months,m=>{
    const items={};
    (m.data.variableEntries||[]).forEach(e=>{const cat=S.categories.find(c=>c.id===e.categoryId);const n=cat?`${cat.icon||''} ${cat.name}`:e.categoryId;items[n]=(items[n]||0)+(e.amount||0);});
    return items;
  }));
}
function buildStatsBlock(title,color,months,extractor){
  const all={};months.forEach(m=>{const items=extractor(m);Object.entries(items).forEach(([k,v])=>all[k]=(all[k]||0)+v);});
  const sorted=Object.entries(all).sort((a,b)=>b[1]-a[1]);
  const tot=sorted.reduce((s,[,v])=>s+v,0);
  const block=mk('div','expand-block');
  const hd=mk('div','exp-hd');hd.innerHTML=`<span class="exp-title">${title}</span><div style="display:flex;align-items:center;gap:8px"><span style="font-size:15px;font-weight:700">${fmt(tot)}</span><span class="exp-ico">›</span></div>`;
  const body=mk('div','exp-body');
  const max=sorted[0]?.[1]||1;
  sorted.forEach(([name,amt])=>{
    const r=mk('div','bar-row');
    r.innerHTML=`<span class="bar-lbl">${esc(name)}</span><div class="bar-bg"><div class="bar-fill ${color}" style="width:${Math.round(amt/max*100)}%"></div></div><span class="bar-val">${fmt(amt)}</span>`;
    body.appendChild(r);
  });
  if(!sorted.length)body.innerHTML='<div class="empty-hint">Keine Daten</div>';
  hd.onclick=()=>{body.classList.toggle('open');hd.querySelector('.exp-ico').classList.toggle('open');};
  block.appendChild(hd);block.appendChild(body);return block;
}

    const deps=(SAV.deposits||[]).filter(d=>d.accountId===acc.id).reduce((s,d)=>s+(d.amount||0),0);
    const mans=(SAV.manualAdditions||[]).filter(d=>d.accountId===acc.id).reduce((s,d)=>s+(d.amount||0),0);
    const wds=(SAV.withdrawals||[]).filter(w=>w.accountId===acc.id).reduce((s,w)=>s+(w.amount||0),0);
    const bal=(acc.startingBalance||0)+deps+mans-wds;
    const card=mk('div','acc-card');
    card.style.borderLeftColor=ACC_COLORS[i%ACC_COLORS.length];
    card.innerHTML=`<div class="acc-top"><span class="acc-name">${acc.icon||'🏦'} ${esc(acc.name)}</span>
      <div style="display:flex;gap:8px;align-items:center">
        <button class="bsave acc-add-btn" style="padding:6px 12px;font-size:13px">+ Hinzufügen</button>
        <button class="acc-del-btn" style="background:none;border:1px solid rgba(200,80,80,.3);color:var(--coral-dk);border-radius:8px;padding:5px 10px;cursor:pointer;font-size:13px;opacity:.7" title="Konto löschen">✕ Konto</button>
      </div></div>
      <div class="acc-bal">${fmt(bal)}</div>
      <div class="acc-meta">Startguthaben + ${fmt(deps+mans)} eingezahlt · ${fmt(wds)} ausgegeben</div>
      <div class="acc-start-row"><span class="acc-start-lbl">Startguthaben:</span>
      <input class="acc-start-in" type="number" value="${acc.startingBalance||''}" placeholder="0,00" step="0.01" data-accid="${acc.id}"></div>`;
    card.querySelector('.acc-add-btn').onclick=()=>{manAccId=acc.id;document.getElementById('manTitle').textContent=`${acc.icon||''} ${acc.name}: Betrag hinzufügen`;document.getElementById('manDate').value=today();document.getElementById('manAmt').value='';document.getElementById('manDesc').value='';document.getElementById('manOvl').classList.add('open');};
    card.querySelector('.acc-del-btn').onclick=()=>delSavAcc(acc.id);
    card.querySelector('.acc-start-in').addEventListener('change',async e=>{acc.startingBalance=parseFloat(e.target.value)||0;await saveSett();buildSavingsPage();});
    c.appendChild(card);
  });

  // Line chart
  const chartCard=mk('div','chart-wrap');
  chartCard.innerHTML=`<div class="chart-title">📈 Entwicklung über die Zeit</div>`;
  chartCard.innerHTML+=buildSavingsChart(accs,ACC_COLORS);
  const legend=mk('div','chart-legend');
  accs.forEach((acc,i)=>{const d=mk('div','leg-item');d.innerHTML=`<div class="leg-dot" style="background:${ACC_COLORS[i%ACC_COLORS.length]}"></div><span>${esc(acc.name)}</span>`;legend.appendChild(d);});
  chartCard.appendChild(legend);
  c.appendChild(chartCard);

  // Add account
  const accCard=mk('div','card');
  accCard.innerHTML=`<div class="card-hd sav"><span class="ctitle">🏦 Konto hinzufügen</span></div>`;
  const[ab,af]=addBtn('acf','+ Neues Konto','sun','fsun');accCard.appendChild(ab);
  af.innerHTML=`<div class="frow"><input class="fi fi-h" id="accN" placeholder="Name (z.B. Scalable)"><button class="bsave sun" id="accS">Hinzufügen</button><button class="bcanc" id="accC">Abbrechen</button></div>`;
  accCard.appendChild(af);af.querySelector('#accS').onclick=addSavAcc;af.querySelector('#accC').onclick=()=>showF('acf',false);
  c.appendChild(accCard);

  // Sonderausgaben
  const sonds=(SAV.withdrawals||[]).sort((a,b)=>(b.date||'')<(a.date||'')?-1:1);
  const sCard=mk('div','card');
  sCard.innerHTML=`<div class="card-hd sond"><span class="ctitle">💸 Sonderausgaben</span><span class="ctotal" style="color:var(--coral-dk)">${fmt(sonds.reduce((s,w)=>s+(w.amount||0),0))}</span></div>`;
  if(!sonds.length)sCard.innerHTML+=`<div class="empty-hint">Noch keine Sonderausgaben</div>`;
  sonds.forEach(w=>{
    const acc=accs.find(a=>a.id===w.accountId);
    const r=mk('div','sond-row');
    r.innerHTML=`<span class="sond-date">${fmtD(w.date)}</span><span class="sond-acc">${esc(acc?.name||'?')}</span><span class="sond-desc">${esc(w.description)||'—'}</span><span class="sond-amt">-${fmt(w.amount)}</span><button class="delbtn">✕</button>`;
    r.querySelector('.delbtn').onclick=()=>delSond(w.id);sCard.appendChild(r);
  });
  const addSondBtnEl=mk('button','addbtn coral');addSondBtnEl.textContent='+ Sonderausgabe eintragen';
  addSondBtnEl.onclick=()=>{
    // Populate account selector
    const sel=document.getElementById('sondAcc');sel.innerHTML=accs.map(a=>`<option value="${a.id}">${esc(a.name)}</option>`).join('');
    document.getElementById('sondDate').value=today();document.getElementById('sondAmt').value='';document.getElementById('sondDesc').value='';
    document.getElementById('sondOvl').classList.add('open');
  };
  sCard.appendChild(addSondBtnEl);c.appendChild(sCard);
}

function buildSavingsChart(accs,colors){
  if(!SAV)return'';
  const now=new Date();
  const monthKeys=[];
  for(let i=11;i>=0;i--){let y=now.getFullYear(),m=now.getMonth()-i;while(m<0){m+=12;y--;}monthKeys.push(`${y}-${pad(m+1)}`);}

  // Calculate running balance per account per month
  const balByAcc={};
  accs.forEach(acc=>{
    let running=acc.startingBalance||0;
    balByAcc[acc.id]={};
    monthKeys.forEach(mKey=>{
      const deps=(SAV.deposits||[]).filter(d=>d.accountId===acc.id&&d.month===mKey).reduce((s,d)=>s+(d.amount||0),0);
      const mans=(SAV.manualAdditions||[]).filter(d=>d.accountId===acc.id&&(d.date||'').slice(0,7)===mKey).reduce((s,d)=>s+(d.amount||0),0);
      const wds=(SAV.withdrawals||[]).filter(w=>w.accountId===acc.id&&(w.date||'').slice(0,7)===mKey).reduce((s,w)=>s+(w.amount||0),0);
      running+=deps+mans-wds;
      balByAcc[acc.id][mKey]=running;
    });
  });

  const allVals=Object.values(balByAcc).flatMap(m=>Object.values(m));
  if(!allVals.some(v=>v!==0)){
    return'<p style="text-align:center;color:var(--muted);font-size:13px;padding:16px">Noch keine Daten</p>';
  }
  const minV=Math.min(0,...allVals),maxV=Math.max(...allVals,100);
  const range=maxV-minV||1;
  const w=320,h=160,pL=48,pR=8,pT=8,pB=24,cW=w-pL-pR,cH=h-pT-pB;
  const xOf=i=>pL+(i/(monthKeys.length-1||1))*cW;
  const yOf=v=>pT+cH-((v-minV)/range)*cH;
  let svg=`<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:160px;overflow:visible">`;
  // Grid
  for(let i=0;i<=3;i++){
    const y=pT+(i/3)*cH,v=maxV-(i/3)*range;
    svg+=`<line x1="${pL}" y1="${y}" x2="${w-pR}" y2="${y}" stroke="var(--border)" stroke-width="1"/>`;
    svg+=`<text x="${pL-4}" y="${y+4}" font-size="9" fill="var(--muted)" text-anchor="end">${fmt(v).replace(/[^0-9,]/g,'').split(',')[0]}€</text>`;
  }
  // Month labels
  monthKeys.forEach((mKey,i)=>{
    if(i%2!==0&&monthKeys.length>6)return;
    const[,m]=mKey.split('-');
    svg+=`<text x="${xOf(i)}" y="${h-2}" font-size="9" fill="var(--muted)" text-anchor="middle">${MN[parseInt(m)-1].slice(0,3)}</text>`;
  });
  // Lines + dots
  accs.forEach((acc,ai)=>{
    const pts=monthKeys.map((mKey,i)=>{const v=balByAcc[acc.id]?.[mKey];return v!==undefined?[xOf(i),yOf(v),mKey]:null;}).filter(Boolean);
    if(pts.length<2)return;
    const color=colors[ai%colors.length];
    svg+=`<polyline points="${pts.map(([px,py])=>`${px},${py}`).join(' ')}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>`;
    pts.forEach(([x,y,mKey])=>{
      svg+=`<circle cx="${x}" cy="${y}" r="5" fill="${color}" stroke="white" stroke-width="2" style="cursor:pointer" onclick="window._showSavDetail('${acc.id}','${mKey}','${esc(acc.name)}')"/>`;
    });
  });
  svg+='</svg>';
  return svg;
}

window._showSavDetail=function(accId,monthKey,accName){
  const acc=(S.savingsAccounts||[]).find(a=>a.id===accId);
  document.getElementById('detailTitle').textContent=`${acc?.icon||''} ${accName}`;
  const body=document.getElementById('detailBody');body.innerHTML='';
  const deps=(SAV.deposits||[]).filter(d=>d.accountId===accId&&d.month===monthKey);
  const mans=(SAV.manualAdditions||[]).filter(d=>d.accountId===accId&&(d.date||'').slice(0,7)===monthKey);
  const wds=(SAV.withdrawals||[]).filter(w=>w.accountId===accId&&(w.date||'').slice(0,7)===monthKey);
  if(!deps.length&&!mans.length&&!wds.length){body.innerHTML='<div class="empty-hint">Keine Einträge in diesem Monat</div>';}
  [...deps,...mans].forEach(d=>{const r=mk('div','erow');r.innerHTML=`<span class="edate">${fmtD(d.date)}</span><span class="edesc">${esc(d.desc||d.description||'Einzahlung')}</span><span class="eamt" style="color:var(--mint-dk)">+${fmt(d.amount)}</span>`;body.appendChild(r);});
  wds.forEach(w=>{const r=mk('div','erow');r.innerHTML=`<span class="edate">${fmtD(w.date)}</span><span class="edesc">${esc(w.description||'Ausgabe')}</span><span class="eamt ein">-${fmt(w.amount)}</span>`;body.appendChild(r);});
  document.getElementById('detailOvl').classList.add('open');
};

async function addSavAcc(){
  const n=document.getElementById('accN').value.trim();if(!n){snack('Bitte Namen eingeben');return;}
  S.savingsAccounts=S.savingsAccounts||[];S.savingsAccounts.push({id:uid(),name:n,icon:'🏦',startingBalance:0});
  await saveSett();showF('acf',false);savLoaded=false;buildSavingsPage();
}
async function delSavAcc(id){
  const acc=(S.savingsAccounts||[]).find(a=>a.id===id);
  if(!acc)return;
  if(!confirm(`"${acc.name}" wirklich löschen?\nAlle Buchungen dieses Kontos werden ebenfalls gelöscht.`))return;
  S.savingsAccounts=(S.savingsAccounts||[]).filter(a=>a.id!==id);
  if(SAV){
    SAV.deposits=(SAV.deposits||[]).filter(d=>d.accountId!==id);
    SAV.withdrawals=(SAV.withdrawals||[]).filter(w=>w.accountId!==id);
    SAV.manualAdditions=(SAV.manualAdditions||[]).filter(m=>m.accountId!==id);
  }
  try{await Promise.all([saveSett(),SAV?savSAV():Promise.resolve()]);}
  catch(e){console.error('delSavAcc:',e);snack('⚠️ Speichern fehlgeschlagen');}
  buildSavingsPage();
}
async function saveManualAddition(){
  const a=parseFloat(document.getElementById('manAmt').value),dt=document.getElementById('manDate').value||today(),d=document.getElementById('manDesc').value.trim();
  if(!a||a<=0){snack('Bitte Betrag eingeben');return;}
  SAV.manualAdditions=SAV.manualAdditions||[];
  SAV.manualAdditions.push({id:uid(),accountId:manAccId,amount:a,date:dt,description:d});
  await savSAV();document.getElementById('manOvl').classList.remove('open');buildSavingsPage();
}
async function saveSondEntry(){
  const a=parseFloat(document.getElementById('sondAmt').value),dt=document.getElementById('sondDate').value||today(),d=document.getElementById('sondDesc').value.trim(),accId=document.getElementById('sondAcc').value;
  if(!a||a<=0){snack('Bitte Betrag eingeben');return;}
  SAV.withdrawals=SAV.withdrawals||[];SAV.withdrawals.push({id:uid(),accountId:accId,amount:a,date:dt,description:d});
  await savSAV();document.getElementById('sondOvl').classList.remove('open');buildSavingsPage();
}
async function delSond(id){SAV.withdrawals=(SAV.withdrawals||[]).filter(w=>w.id!==id);await savSAV();buildSavingsPage();}

// ── ADD BTN HELPER
function addBtn(fid,label,color,bgCls){
  const b=mk('button',`addbtn ${color}`);b.textContent=label;b.onclick=()=>showF(fid,document.getElementById(fid)?.style.display!=='block');
  const f=mk('div',`fwrap ${bgCls}`);f.id=fid;return[b,f];
}

// ── BACKUP
function buildBackup(){
  const sec=mk('div','card');
  sec.innerHTML=`<div class="card-hd" style="border-left:4px solid var(--muted)"><span class="ctitle">⚙️ Backup</span></div>
    <div class="row" style="gap:10px;padding:14px 16px">
      <button class="bsave" style="flex:1" id="expBtn">📤 Exportieren</button>
      <button class="bsave" style="flex:1;background:linear-gradient(135deg,var(--peach-dk),var(--sun-dk))" id="impBtn">📥 Importieren</button>
    </div>
    <div style="padding:0 16px 14px;font-size:12px;color:var(--muted)">💡 Tipp: App auf Computer & Handy öffnen — Daten sind automatisch überall gleich (Firebase-Sync).</div>`;
  sec.querySelector('#expBtn').onclick=exportData;
  sec.querySelector('#impBtn').onclick=()=>document.getElementById('importFile').click();
  return sec;
}
async function exportData(){
  snack('Exportiere... 📤');
  const months={};
  for(let i=0;i<13;i++){let y=yr,m=mo-i;while(m<0){m+=12;y--;}const key=`${y}-${pad(m+1)}`;
    try{const s=await getDoc(doc(db,'personal_months',key));if(s.exists())months[key]=s.data();}catch(e){}}
  if(!SAV)await loadSavings();
  const data={version:1,exportDate:new Date().toISOString(),settings:S,months,savings:SAV};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=`finanz-backup-${today()}.json`;a.click();
  URL.revokeObjectURL(url);snack('Backup gespeichert! ✅');
}
document.getElementById('importFile').addEventListener('change',async e=>{
  const file=e.target.files[0];if(!file)return;
  try{
    const data=JSON.parse(await file.text());
    if(!data.version||!data.settings){snack('Ungültige Datei ❌');return;}
    if(!confirm('Alle aktuellen Daten mit dem Backup überschreiben?'))return;
    snack('Importiere... 📥');
    await setDoc(settRef(),data.settings);
    if(data.savings)await setDoc(savRef(),data.savings);
    for(const[key,mData]of Object.entries(data.months||{})){await setDoc(doc(db,'personal_months',key),mData);}
    snack('Import erfolgreich! 🌸');
    S=null;await init();
  }catch(err){snack('Fehler beim Import ❌');console.error(err);}
  e.target.value='';
});

// ── EVENTS
document.querySelectorAll('.bnav button').forEach(btn=>{
  btn.onclick=async()=>{
    const pg=btn.dataset.page;
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.querySelectorAll('.bnav button').forEach(b=>b.classList.remove('active'));
    document.getElementById(`page-${pg}`).classList.add('active');btn.classList.add('active');
    if(pg==='stats'&&!statsLoaded){statsLoaded=true;await buildStats();}
    if(pg==='savings'&&!savLoaded){savLoaded=true;await buildSavingsPage();}
  };
});
function navTo(delta){
  if(isLoading)return;
  if(delta<0){if(mo===0){mo=11;yr--;}else mo--;}
  else{if(mo===11){mo=0;yr++;}else mo++;}
  statsLoaded=false;savLoaded=false;
  document.getElementById('mlabel').textContent=`${MN[mo]} ${yr}`;
  closeAllSheets();
  init();
}
document.getElementById('prevBtn').addEventListener('click',()=>navTo(-1));
document.getElementById('nextBtn').addEventListener('click',()=>navTo(1));

// Fixed sheet
document.getElementById('closeFx').onclick=()=>document.getElementById('fxOvl').classList.remove('open');
document.getElementById('fxOvl').onclick=e=>{if(e.target===document.getElementById('fxOvl'))document.getElementById('fxOvl').classList.remove('open');};
document.getElementById('fxTitle').addEventListener('change',async e=>{const fc=M.fixedCosts.find(f=>f.id===activeFxId);if(fc){await renameFx(fc.id,e.target.value);}});
document.getElementById('fxAddSubTrig').onclick=()=>{const f=document.getElementById('fxAddForm');showF('fxAddForm',f.style.display!=='block');if(f.style.display==='block')document.getElementById('subName').focus();};
document.getElementById('subSave').onclick=addSub;
document.getElementById('subCanc').onclick=()=>showF('fxAddForm',false);

// Variable sheet
document.getElementById('closeVar').onclick=()=>document.getElementById('varOvl').classList.remove('open');
document.getElementById('varOvl').onclick=e=>{if(e.target===document.getElementById('varOvl'))document.getElementById('varOvl').classList.remove('open');};
document.getElementById('varTitle').addEventListener('change',async e=>{if(activeCat){await renameCat(activeCat.id,e.target.value.replace(/^[^\w]+/,'').trim());}});
document.getElementById('varAddTrig').onclick=()=>{const f=document.getElementById('varForm');showF('varForm',f.style.display!=='block');if(f.style.display==='block')document.getElementById('eAmt').focus();};
document.getElementById('saveEntry').onclick=saveEntry;document.getElementById('cancEntry').onclick=()=>showF('varForm',false);
document.getElementById('eDesc').addEventListener('keydown',e=>{if(e.key==='Enter')saveEntry();});
document.getElementById('chipFix').onclick=()=>{eFix=!eFix;if(eFix)eEin=false;updChips();};
document.getElementById('chipEin').onclick=()=>{eEin=!eEin;if(eEin)eFix=false;updChips();};

// Del confirm
document.getElementById('delNow').onclick=async()=>{if(pendingDel)await delEntry(pendingDel.id);pendingDel=null;document.getElementById('delOvl').classList.remove('open');};
document.getElementById('delPerm').onclick=async()=>{if(pendingDel)await delEntryAndRec(pendingDel.id);pendingDel=null;document.getElementById('delOvl').classList.remove('open');};
document.getElementById('delCanc').onclick=()=>{pendingDel=null;document.getElementById('delOvl').classList.remove('open');};

// Savings sheets
document.getElementById('saveMan').onclick=saveManualAddition;document.getElementById('cancMan').onclick=()=>document.getElementById('manOvl').classList.remove('open');document.getElementById('closeMan').onclick=()=>document.getElementById('manOvl').classList.remove('open');
document.getElementById('saveSondBtn').onclick=saveSondEntry;document.getElementById('cancSond').onclick=()=>document.getElementById('sondOvl').classList.remove('open');document.getElementById('closeSond').onclick=()=>document.getElementById('sondOvl').classList.remove('open');
document.getElementById('closeDetail').onclick=()=>document.getElementById('detailOvl').classList.remove('open');

// ── BOOT
async function init(){
  if(isLoading)return;
  isLoading=true;
  ['prevBtn','nextBtn'].forEach(id=>{const b=document.getElementById(id);if(b)b.style.opacity='.4';});
  document.getElementById('content').innerHTML='<div class="loading">Lade... 🌸</div>';
  try{
    if(!S)await loadSettings();
    M=null;
    await loadOrInitMonth();
    render();
  }catch(e){
    console.error('Ladefehler:',e);
    const errDiv=document.createElement('div');
    errDiv.style.cssText='text-align:center;padding:40px;color:var(--sub)';
    errDiv.innerHTML=`⚠️ Laden fehlgeschlagen.<br><small>${e?.message||'Internetverbindung prüfen.'}</small><br>`;
    const retryBtn=document.createElement('button');
    retryBtn.className='bsave';retryBtn.style.cssText='margin-top:14px;padding:10px 24px';
    retryBtn.textContent='🔄 Nochmal laden';retryBtn.onclick=()=>{isLoading=false;init();};
    errDiv.appendChild(retryBtn);
    document.getElementById('content').innerHTML='';
    document.getElementById('content').appendChild(errDiv);
  }finally{
    isLoading=false;
    ['prevBtn','nextBtn'].forEach(id=>{const b=document.getElementById(id);if(b)b.style.opacity='';});
  }
}
init();
</script>
